<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: { DEFAULT: '#D4AF37', light: '#F9F295', dark: '#B8860B' } },
                    fontFamily: { serif: ['Noto Serif', 'serif'], sans: ['Manrope', 'sans-serif'], luxe: ['Noto Serif', 'serif'] }
                }
            }
        }
    </script>

    <style type="text/css">
        body { background-color: #000; color: #fff; font-family: 'Manrope', sans-serif; overflow-x: hidden; margin: 0; }
        .font-luxe { font-family: 'Noto Serif', serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-dark { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        #initial-loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease-out; }
        
        .reveal { animation: reveal 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        @keyframes reveal { from { opacity: 0; transform: translateY(80px); } to { opacity: 1; transform: translateY(0); } }
        
        .img-zoom:hover img { transform: scale(1.05); transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .nav-link { position: relative; padding-bottom: 2px; }
        .nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: #D4AF37; transition: width 0.3s ease; }
        .nav-link:hover::after { width: 100%; }
        
        /* New animations for custom sections */
        .fade-in-up { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .fade-in-up.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="text-gold text-2xl tracking-[0.5em] font-luxe animate-pulse">DND STORE</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const UNIVERSES = [
            { 
                id: 'perruques', 
                title: 'Perruques d’Exception', 
                subtitle: 'La Collection Couronne',
                desc: 'L\'art capillaire à son apogée. Chaque perruque est une pièce unique conçue avec les standards les plus élevés du luxe.', 
                items: [
                    { name: 'Silk Premium', price: '150,000 FCFA', img: './images/perruques/new-1.jpg' },
                    { name: 'Gold Wave', price: '180,000 FCFA', img: './images/perruques/new-2.jpg' },
                    { name: 'Imperial Lace', price: '200,000 FCFA', img: './images/perruques/new-3.jpg' },
                    { name: 'Onyx Noir', price: '160,000 FCFA', img: './images/perruques/new-4.jpg' }
                ]
            },
            { 
                id: 'fashion', 
                title: 'Prêt-à-Porter', 
                subtitle: 'Silhouette & Vision',
                desc: 'Une mode audacieuse et raffinée qui redéfinit l\'élégance contemporaine.', 
                items: [
                    { name: 'Robe Gala Nuit', price: '45,000 FCFA', img: './images/habits/new-6.jpg' },
                    { name: 'Ensemble Chic', price: '35,000 FCFA', img: './images/habits/new-7.jpg' },
                    { name: 'Style Urbain', price: '40,000 FCFA', img: './images/habits/new-8.jpg' },
                    { name: 'Manteau Luxe', price: '85,000 FCFA', img: './images/habits/new-9.jpg' }
                ]
            }
        ];

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const useIntersectionObserver = (options = {}) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.1, ...options });

                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);

            return [ref, isVisible];
        };

        const AnimatedElement = ({ children, className = "" }) => {
            const [ref, isVisible] = useIntersectionObserver();
            return (
                <div ref={ref} className={`fade-in-up ${isVisible ? 'visible' : ''} ${className}`}>
                    {children}
                </div>
            );
        };

        const Background3D = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                if (!mountRef.current || !window.THREE) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Opti perf
                mountRef.current.appendChild(renderer.domElement);

                // Particules d'or
                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 2000;
                const posArray = new Float32Array(particlesCount * 3);

                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 12; // Espace plus large
                }

                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.02,
                    color: 0xD4AF37,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending
                });

                const particlesMesh = new THREE.Points(particlesGeometry, material);
                scene.add(particlesMesh);
                camera.position.z = 3;

                // Mouvement fluide (Parallax)
                let mouseX = 0; let mouseY = 0;
                let targetX = 0; let targetY = 0;
                const windowHalfX = window.innerWidth / 2;
                const windowHalfY = window.innerHeight / 2;

                const onMouseMove = (event) => {
                    mouseX = (event.clientX - windowHalfX);
                    mouseY = (event.clientY - windowHalfY);
                };
                document.addEventListener('mousemove', onMouseMove);

                const animate = () => {
                    requestAnimationFrame(animate);
                    targetX = mouseX * 0.001;
                    targetY = mouseY * 0.001;

                    // Interpolation douce (lerp)
                    particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
                    particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);
                    
                    // Rotation lente continue
                    particlesMesh.rotation.y += 0.001;
                    particlesMesh.rotation.x += 0.0005;

                    renderer.render(scene, camera);
                };
                animate();

                const onResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', onResize);

                return () => {
                    window.removeEventListener('resize', onResize);
                    document.removeEventListener('mousemove', onMouseMove);
                    if (mountRef.current && renderer.domElement.parentNode) {
                        mountRef.current.removeChild(renderer.domElement);
                    }
                    particlesGeometry.dispose();
                    material.dispose();
                    renderer.dispose();
                };
            }, []);

            return <div ref={mountRef} className="absolute inset-0 z-[5] pointer-events-none opacity-60" />;
        };

        const App = () => {
            useEffect(() => {
                const loader = document.getElementById('initial-loader');
                if (loader) setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 800); }, 1000);
            }, []);

            return (
                <div className="min-h-screen bg-black">
                    {/* NAV */}

                            <span className="text-[7px] md:text-[9px] uppercase tracking-[0.6em] text-zinc-500 font-bold mt-1">L'Héritage du Luxe</span>
                        </div>
                        <div className="hidden lg:flex gap-12 text-[9px] uppercase tracking-[0.4em] font-bold text-zinc-400">
                            <a href="#" className="nav-link">Accueil</a>
                            <a href="#perruques" className="nav-link">Perruques</a>
                            <a href="#fashion" className="nav-link">Fashion</a>
                            <a href="#cuir" className="nav-link">Maroquinerie</a>
                            <a href="#horlogerie" className="nav-link">Horlogerie</a>
                            <a href="#" className="nav-link">Contact</a>
                        </div>
                        <div className="flex items-center gap-8">
                            <LucideIcon name="shopping-bag" className="text-gold cursor-pointer" />
                            <LucideIcon name="menu" className="lg:hidden" />
                        </div>
                    </nav>

                    {/* SECTION 1: BIENVENUE (HERO) */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden bg-[#0a0a0a]">
                        <div className="absolute inset-0 z-0" style={{ backgroundImage: 'url("./images/hero-fondatrice.jpg")', backgroundSize: 'contain', backgroundRepeat: 'no-repeat', backgroundPosition: 'center', filter: 'brightness(0.4) saturate(1.2)' }} />
                        <Background3D />
                        <div className="absolute inset-0 z-10 bg-gradient-to-b from-black/80 via-transparent to-black" />
                        
                        <div className="relative z-20 text-center px-6 reveal">
                            <div className="mb-10 text-gold text-xs tracking-[0.6em] uppercase font-bold">Maison de Prestige depuis 2024</div>
                            <h1 className="text-5xl md:text-[9rem] font-luxe mb-10 leading-none tracking-tighter">

                            <div className="h-20 w-[1px] bg-gold mx-auto mb-10"></div>
                            <p className="text-zinc-400 text-sm md:text-lg max-w-3xl mx-auto leading-relaxed font-light uppercase tracking-[0.1em]">
                                L'EXCÉLLENCE DE LA MODE ET DE LA BEAUTÉ CAPILLAIRE RÉUNIES DANS UN ÉCRIN DE LUXE.
                            </p>
                            <a href="#fondatrice" className="mt-16 inline-block px-14 py-5 bg-gold text-black uppercase tracking-[0.3em] text-[10px] font-bold hover:bg-white transition-all duration-700 shadow-2xl">
                                Découvrir notre Patrimoine
                            </a>
                        </div>
                    </section>

                    {/* SECTION 2: LA FONDATRICE (LA VISION) */}
                    <section id="fondatrice" className="py-40 px-10 bg-[#060606] relative overflow-hidden">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-24">
                            <div className="lg:w-1/2 reveal">
                                <h3 className="text-gold uppercase tracking-[0.5em] text-[11px] mb-8 font-bold">La Vision de la Créatrice</h3>
                                <h2 className="text-5xl md:text-8xl font-luxe mb-12 leading-none">Sublimer <br/> <span className="text-gold italic">votre Aura</span></h2>
                                <p className="text-zinc-300 text-xl font-serif italic leading-relaxed mb-10 opacity-80 border-l-2 border-gold pl-8">
                                    "Mon ambition est de transformer chaque accessoire en un symbole de pouvoir et d'élégance pour la femme moderne."
                                </p>
                                <p className="text-zinc-500 text-sm md:text-base font-light leading-relaxed mb-16">
                                    DND Store n'est pas seulement une boutique, c'est l'aboutissement d'une passion pour le détail et l'excellence. Notre fondatrice sélectionne chaque fibre, chaque tissu et chaque mouvement avec une rigueur absolue pour garantir une expérience de prestige unique au monde.
                                </p>
                            </div>
                            <div className="lg:w-1/2 relative group reveal">
                                <div className="absolute -inset-6 border border-gold/10 -z-10 translate-x-10 translate-y-10 group-hover:translate-x-0 group-hover:translate-y-0 transition-transform duration-1000"></div>
                                <div className="aspect-[4/5] overflow-hidden glass p-4">
                                    <img src="./images/perruques/new-5.jpg" className="w-full h-full object-cover object-top scale-[1.15] grayscale-[0.3] group-hover:grayscale-0 transition-all duration-1000" alt="Fondatrice Vision" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SECTIONS UNIVERS (PERRUQUES & FASHION) */}
                    {UNIVERSES.map((universe, idx) => (
                        <section key={universe.id} id={universe.id} className={`py-40 px-10 ${idx % 2 === 0 ? 'bg-black' : 'bg-[#040404]'}`}>
                            <div className="max-w-7xl mx-auto">
                                <AnimatedElement>
                                    <div className="flex flex-col md:flex-row justify-between items-end mb-32 gap-10">
                                        <div className="max-w-2xl">
                                            <div className="text-gold text-[10px] uppercase tracking-[0.6em] mb-6 font-bold">{universe.subtitle}</div>
                                            <h2 className="text-6xl md:text-8xl font-luxe mb-8 uppercase tracking-tighter leading-none">
                                                {universe.title.split(' ')[0]} <br/> <span className="text-gold italic font-medium">{universe.title.split(' ').slice(1).join(' ')}</span>
                                            </h2>
                                            <p className="text-zinc-500 font-light text-sm md:text-base leading-relaxed uppercase tracking-widest">{universe.desc}</p>
                                        </div>
                                    </div>
                                </AnimatedElement>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    {universe.items.map((item, i) => (
                                        <AnimatedElement key={i}>
                                            <a href={`https://wa.me/243897861013?text=Je m'intéresse à cet article d'exception : ${item.name}`} target="_blank" className="block group img-zoom">
                                                <div className="aspect-[3/4] overflow-hidden mb-8 relative glass p-2 rounded-sm border border-white/5 group-hover:border-gold/30 transition-colors">
                                                    <img src={item.img} className="w-full h-full object-cover object-top transition-transform duration-[2s]" alt={item.name} />
                                                    <div className="absolute inset-x-0 bottom-0 p-8 glass-dark translate-y-full group-hover:translate-y-0 transition-transform duration-700">
                                                        <div className="w-full py-4 bg-gold text-black text-center text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-colors block">
                                                            Commander
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center px-2">
                                                    <h4 className="text-xl font-luxe group-hover:text-gold transition-colors">{item.name}</h4>
                                                </div>
                                            </a>
                                        </AnimatedElement>
                                    ))}
                                </div>
                            </div>
                        </section>
                    ))}

                    {/* BESPOKE SECTION: CUIR */}
                    <section id="cuir" className="py-40 px-10 max-w-7xl mx-auto relative">
                        <AnimatedElement>
                            <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                                <div className="max-w-2xl">
                                    <div className="text-gold text-[10px] uppercase tracking-[0.6em] mb-4 font-bold">Maroquinerie de Luxe</div>
                                    <h2 className="text-5xl md:text-7xl font-luxe mb-6 uppercase tracking-tighter">
                                        Cuir <span className="text-gold italic">Sculpté</span>

                                    <p className="text-zinc-400 font-light text-sm md:text-base leading-relaxed max-w-lg">
                                        Le travail du cuir porté au rang d'art. Des accessoires qui racontent une histoire d'excellence et de durabilité.
                                    </p>
                                </div>
                            </div>
                        </AnimatedElement>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <AnimatedElement className="md:col-span-2">
                                <a href="https://wa.me/243897861013?text=Je m'intéresse à la collection : Sac Signature et Accessoires" target="_blank" className="block group relative">
                                    <div className="aspect-[16/9] overflow-hidden rounded-2xl mb-6 relative glass p-2 border border-white/5 group-hover:border-gold/30 transition-colors duration-500 img-zoom">
                                        <img src="./images/luxury_leather.png" alt="Collection Cuir Signature" className="w-full h-full object-cover rounded-xl" />

                                                <LucideIcon name="shopping-bag" size={14} /> Commander
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-start px-2">
                                        <div>
                                            <h3 className="text-2xl font-luxe group-hover:text-gold transition-colors">Sac Signature & Accessoires</h3>
                                            <p className="text-sm text-zinc-500 mt-1">Vue d'ensemble de la collection</p>
                                        </div>

                                </a>
                            </AnimatedElement>

                            <AnimatedElement className="group relative">

                                    <img src="./images/luxury_leather.png" alt="Détail Cuir" className="w-full h-full object-cover scale-150 origin-top-left transition-transform duration-[3s] group-hover:scale-[1.7]" />
                                    <div className="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black to-transparent">
                                        <h4 className="text-lg font-luxe">Détail Texture</h4>
                                        <p className="text-xs text-zinc-400">Cuir pleine fleur</p>
                                    </div>
                                </div>
                            </AnimatedElement>

                            <AnimatedElement className="group relative">
                                <div className="aspect-[3/4] overflow-hidden rounded-2xl mb-6 relative glass border border-white/5 group-hover:border-gold/30 transition-colors duration-500">
                                    <img src="./images/luxury_leather.png" alt="Détail Finitions" className="w-full h-full object-cover scale-[1.8] origin-bottom-right transition-transform duration-[3s] group-hover:scale-[2]" />
                                    <div className="absolute inset-x-0 bottom-0 p-6 bg-gradient-to-t from-black to-transparent">
                                        <h4 className="text-lg font-luxe">Détail Finitions</h4>
                                        <p className="text-xs text-zinc-400">Coutures sellier</p>
                                    </div>
                                </div>
                            </AnimatedElement>
                            
                            <AnimatedElement className="flex flex-col justify-center items-center text-center p-12 glass rounded-2xl border border-white/5 md:col-span-2">
                                <div className="w-16 h-[1px] bg-gold mb-8"></div>
                                <h3 className="text-3xl font-luxe mb-6">L'Artisanat <br/>Sans Compromis</h3>
                                <p className="text-zinc-400 font-light leading-relaxed mb-8 max-w-lg mx-auto">
                                    Chaque pièce de notre collection maroquinerie est cousue main par des maîtres artisans, utilisant uniquement les cuirs les plus nobles et des finitions en or massif.
                                </p>
                                <button className="text-xs uppercase tracking-widest border-b border-gold pb-1 text-gold hover:text-white hover:border-white transition-colors">
                                    Découvrir le Savoir-Faire

                        </div>
                    </section>

                    {/* BESPOKE SECTION: HORLOGERIE */}

                        <AnimatedElement>
                            <div className="flex flex-col md:flex-row-reverse justify-between items-end mb-16 gap-6 px-4 md:px-12 pt-12">
                                <div className="max-w-2xl md:text-right">

                                        Haute <span className="text-gold italic">Horlogerie</span>
                                    </h2>
                                    <p className="text-zinc-400 font-light text-sm md:text-base leading-relaxed max-w-lg md:ml-auto">
                                        La mécanique de précision rencontre l'esthétique pure. Une collection de garde-temps immortels pour les poignets les plus exigeants.
                                    </p>
                                </div>
                            </div>
                        </AnimatedElement>

                        <div className="px-4 md:px-12 pb-12 grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <AnimatedElement className="w-full lg:col-span-2">
                                <a href="https://wa.me/243897861013?text=Je m'intéresse au garde-temps : Chronographe Impérial" target="_blank" className="block relative group h-full">
                                    <div className="h-full min-h-[400px] overflow-hidden rounded-2xl relative border border-gold/10 img-zoom">
                                        <img src="./images/luxury_watch.png" alt="Garde-temps de Prestige" className="w-full h-full object-cover" />

                            </AnimatedElement>

                            <div className="flex flex-col gap-8">
